<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="color-scheme" content="light dark" />
        <link rel="stylesheet" href="pico.min.css" />
        <title>Sparkle</title>
    </head>
    <body class="container">
        <nav>
            <ul>
                <li>
                    <strong style="font-size: larger">Sparkle</strong><br />
                    <span style="font-size: large">那些人啊，繁星闪闪</span>
                </li>
            </ul>
            <ul>
                <li><a href="add-book.html">添加书籍</a></li>
                <li><a href="about.html">关于</a></li>
                <li>
                    <a href="https://ifdian.net/a/deadpoetspoon"
                        >请作者喝一杯咖啡</a
                    >
                </li>
            </ul>
        </nav>
        <main class="container">
            <article style="display: flex; gap: 10px">
                <select
                    id="auther-selector"
                    name="auther"
                    aria-label="作者..."
                    required
                >
                    <option selected disabled value="">作者...</option>
                </select>
                <select
                    id="book-selector"
                    name="favorite-cuisine"
                    aria-label="著作..."
                    required
                >
                    <option selected disabled value="">著作...</option>
                </select>
                <select
                    id="version-selector"
                    name="version"
                    aria-label="版本..."
                    required
                >
                    <option selected disabled value="">版本...</option>
                </select>
            </article>
            <article
                id="auther-info"
                class="overflow-auto"
                style="height: 10em"
            ></article>
            <article id="cy" style="height: 40em"></article>
            <article id="node-info"></article>
        </main>
        <script src="cytoscape.min.js"></script>
        <script type="module" src="app.js"></script>
    </body>
</html>
