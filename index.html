<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="color-scheme" content="light dark" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
        />
        <title>Sparkle</title>
    </head>
    <body class="container">
        <header>
            <nav>
                <ul>
                    <li><strong>Sparkle</strong></li>
                </ul>
                <ul>
                    <li><a href="add-book.html">Add Book</a></li>
                </ul>
                <ul>
                    <li><a href="about.html">About</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <article>
                <select
                    id="auther-selector"
                    name="auther"
                    aria-label="Select author..."
                    required
                >
                </select>
                <select
                    id="book-selector"
                    name="favorite-cuisine"
                    aria-label="Select book..."
                    required
                >
                </select>
                <select
                    id="version-selector"
                    name="version"
                    aria-label="Select version..."
                    required
                > 
                    <option selected value="default">
                        default
                    </option>
                </select>
            </article>
            <div>
                <article id="cy" style="height: 40em"></article>
                <article id="node-info">bbb</article>
            </div>
        </main>
        <script src="
        https://cdn.jsdelivr.net/npm/cytoscape@3.33.1/dist/cytoscape.min.js
        "></script>
        <script type="module" src="app.js"></script>
    </body>
</html>
