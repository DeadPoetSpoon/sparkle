<!doctype html>
<html lang="zh">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="color-scheme" content="light dark" />
        <link rel="stylesheet" href="pico.min.css" />
        <title>Sparkle ✨</title>
    </head>
    <body class="container">
        <nav>
            <ul>
                <li>
                    <strong style="font-size: larger"
                        ><a href="index.html">Sparkle ✨</a></strong
                    ><br />
                    <span style="font-size: large">那些人啊，繁星闪闪</span>
                </li>
            </ul>
            <ul>
                <li><a href="add-book.html">添加书籍</a></li>
                <li><a href="about.html">关于</a></li>
                <li>
                    <a href="https://ifdian.net/a/deadpoetspoon"
                        >请作者喝一杯咖啡</a
                    >
                </li>
            </ul>
        </nav>
        <main class="container">
            <article style="display: flex; gap: 10px">
                <select
                    id="auther-selector"
                    name="auther"
                    aria-label="作者..."
                    required
                >
                    <option selected disabled value="">作者...</option>
                </select>
                <select
                    id="book-selector"
                    name="favorite-cuisine"
                    aria-label="著作..."
                    required
                >
                    <option selected disabled value="">著作...</option>
                </select>
                <select
                    id="version-selector"
                    name="version"
                    aria-label="版本..."
                    required
                >
                    <option selected disabled value="">版本...</option>
                </select>
            </article>
            <article
                id="auther-info"
                class="overflow-auto"
                style="height: 10em"
            ></article>
            <article id="cy" style="height: 40em; position: relative">
                <button
                    id="fullscreen-btn"
                    style="
                        position: absolute;
                        top: 1rem;
                        right: 1rem;
                        z-index: 1000;
                        padding: 0.5rem 1rem;
                        font-size: 0.875rem;
                        background-color: var(--pico-primary-background);
                        color: var(--pico-primary-inverse);
                        border: var(--pico-border-width) solid
                            var(--pico-primary-border);
                        border-radius: var(--pico-border-radius);
                        cursor: pointer;
                        transition:
                            background-color var(--pico-transition),
                            border-color var(--pico-transition),
                            color var(--pico-transition),
                            box-shadow var(--pico-transition);
                        opacity: 0.9;
                        pointer-events: auto;
                    "
                    onmouseover="
                        this.style.backgroundColor =
                            'var(--pico-primary-hover-background)';
                        this.style.borderColor =
                            'var(--pico-primary-hover-border)';
                        this.style.opacity = '1';
                    "
                    onmouseout="
                        this.style.backgroundColor =
                            'var(--pico-primary-background)';
                        this.style.borderColor = 'var(--pico-primary-border)';
                        this.style.opacity = '0.9';
                    "
                >
                    ⛶ 全屏
                </button>
            </article>
            <article id="node-info"></article>
        </main>
        <script src="cytoscape.min.js"></script>
        <script type="module" src="app.js"></script>
    </body>
</html>
